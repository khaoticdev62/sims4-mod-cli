name: Tests

on: [push, pull_request]

jobs:
  lint-type-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e '.[dev]'
      - run: ruff check s4chemist_cli.py tests
      - run: mypy s4chemist_cli.py
      - run: pytest tests/ -v
