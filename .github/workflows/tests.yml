name: Tests

on: [push, pull_request]

jobs:
  lint-type-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e '.[dev]'
      - name: DEBUG subprocess capture
        shell: bash
        run: |
          python --version
          python -c "import subprocess,sys; r=subprocess.run([sys.executable,'s4chemist_cli.py','version'],stdout=subprocess.PIPE,stderr=subprocess.PIPE,timeout=60); print('BYTES RC',r.returncode); print('BYTES OUT',repr(r.stdout)); print('BYTES ERR',repr(r.stderr))"
          python -c "import subprocess,sys,locale; print('PREF',locale.getpreferredencoding(False)); r=subprocess.run([sys.executable,'s4chemist_cli.py','version'],capture_output=True,text=True,encoding='utf-8',errors='replace',timeout=60); print('UTF8 RC',r.returncode); print('UTF8 OUT',repr(r.stdout))"
      - run: ruff check s4chemist_cli.py tests
      - run: mypy s4chemist_cli.py
      - run: pytest tests/ -v
